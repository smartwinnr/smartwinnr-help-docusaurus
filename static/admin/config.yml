backend:
  name: gitlab
  repo: smartwinnr/help-docs
  branch: main
  auth_type: pkce
  app_id: your_gitlab_app_id
  auth_endpoint: https://gitlab.com/oauth/authorize
  token_endpoint: https://gitlab.com/oauth/token
  api_root: https://gitlab.com/api/v4

# Media configuration
media_folder: static/img
public_folder: /img
media_library:
  name: uploadcare
  config:
    publicKey: your_uploadcare_key

# Site configuration
site_url: https://help.smartwinnr.com
display_url: https://help.smartwinnr.com
logo_url: /img/logo_blue.svg

# Editorial workflow
publish_mode: editorial_workflow
editor:
  preview: true

# Collections configuration
collections:
  # Getting Started Section
  - name: getting-started
    label: "📚 Getting Started"
    folder: docs/getting-started
    create: true
    delete: true
    slug: "{{slug}}"
    preview_path: "getting-started/{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "string", required: false}
      - {label: "Sidebar Position", name: "sidebar_position", widget: "number", required: false}
      - {label: "Slug", name: "slug", widget: "string", required: false}
      - {label: "Tags", name: "tags", widget: "list", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

  # Quiz & Assessments
  - name: quiz-assessments
