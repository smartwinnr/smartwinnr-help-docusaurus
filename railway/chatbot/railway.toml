[build]
builder = "dockerfile"
dockerfilePath = "../../Dockerfile.chatbot"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Chatbot env
[environments.production.variables]
# The port your server listens on
API_PORT = "3002"

# CORS origin for your docs site
CORS_ORIGIN = "https://help.smartwinnr.com"

# ChromaDB connection using Railway service variable references (preferred)
CHROMA_HOST = "${{ chromadb.RAILWAY_PRIVATE_DOMAIN }}"
CHROMA_PORT = "8000"

# Alternative: Manual configuration after first deploy
# If Railway variable references don't work, uncomment and use internal host:
# CHROMA_HOST = "chromadb.railway.internal"  # Replace with actual internal host
# CHROMA_PORT = "8000"

# OpenAI API Key - MUST be set as a secret in Railway UI
# Do not set this value here - use Railway dashboard to add OPENAI_API_KEY as secret
# OPENAI_API_KEY will be automatically available to the service