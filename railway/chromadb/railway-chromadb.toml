[build]
builder = "dockerfile"
dockerfilePath = "../../Dockerfile.chromadb"

[deploy]
healthcheckPath = "/api/v1/heartbeat"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Chroma server env (official names)
[environments.production.variables]
CHROMA_SERVER_HOST = "0.0.0.0"
CHROMA_SERVER_HTTP_PORT = "8000"
PERSIST_DIRECTORY = "/chroma/data"
ANONYMIZED_TELEMETRY = "False"

# Volume configuration - ChromaDB persistent storage
# Volume 'chromadb-volume' has been created and attached via Railway CLI
# railway volume add --mount-path /chroma/data
[volumes]
"/chroma/data" = "chromadb-volume"