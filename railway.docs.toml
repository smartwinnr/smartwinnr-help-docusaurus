# ./railway.docs.toml (for Docusaurus docs service)
[build]
builder = "dockerfile"
dockerfilePath = "docker/docs/Dockerfile.docs"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[environments.production]
RAILWAY_SERVICE = "docs"

# Optional: if you want to inject private host via envsubst in nginx,
