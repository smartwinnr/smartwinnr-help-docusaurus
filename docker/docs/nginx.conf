server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Serve static files
  location / {
    try_files $uri /index.html;
  }

  # Proxy API calls to Chatbot service over Railway private network
  # (no CORS needed; stays same-origin for the browser)
  location /api/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # IMPORTANT: Chatbot must be reachable here.
    # You can use the private domain or the service DNS.
    proxy_pass http://chatbot-api.railway.internal:3002/;
    # Alternatively (variable interpolation):
    # proxy_pass http://${CHATBOT_INTERNAL_HOST}:${CHATBOT_INTERNAL_PORT}/;
  }
}